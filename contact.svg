<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150" role="img" aria-label="Открыт к senior / lead backend-роли. Telegram @captainDima, dimitricaptain@yandex.by">
  <defs>
    <linearGradient id="cpanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171D"/>
      <stop offset="1" stop-color="#0F1116"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD9B0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFD9B0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFD9B0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="barclip"><rect x="2" y="2" width="1196" height="5" rx="2.5"/></clipPath>
  </defs>

  <!-- panel with copper border to draw the eye -->
  <rect x="2" y="2" width="1196" height="146" rx="18" fill="url(#cpanel)" stroke="#C2611F" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- animated shimmer along the top accent bar -->
  <g clip-path="url(#barclip)">
    <rect x="2" y="2" width="1196" height="5" fill="#C2611F" opacity="0.5"/>
    <rect x="-220" y="2" width="220" height="5" fill="url(#shine)">
      <animate attributeName="x" from="-220" to="1200" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- pulsing availability dot -->
  <circle cx="80" cy="50" r="6" fill="#52B364">
    <animate attributeName="r" values="6;16" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="50" r="5.5" fill="#52B364">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <text x="98" y="55" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-size="14" letter-spacing="2.5" fill="#7FCB8D">ОТКРЫТ К ПРЕДЛОЖЕНИЯМ</text>

  <text x="42" y="93" font-family="'Segoe UI',system-ui,-apple-system,Roboto,'Noto Sans',sans-serif" font-size="20" font-weight="500" fill="#E7EAEF">
    <tspan x="42">Открыт к senior / lead backend-роли в продукте, где нужен широкий бэкендер, умеющий в AI.</tspan>
  </text>

  <text x="42" y="124" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace" font-size="14.5" fill="#8A929E">Быстрее всего отвечаю в <tspan fill="#E8863C">Telegram</tspan> · <tspan fill="#C7CDD6">dimitricaptain@yandex.by</tspan></text>
</svg>
